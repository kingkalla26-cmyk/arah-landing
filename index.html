<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ארה - סדנאות חיות עם אילה</title>
    <meta name="description" content="סדנאות וחוגים חוויתיים עם חיות לגנים, מוסדות, משפחות ואירועים - בית שמש והאזור. פנו אלינו לתיאום סדנה בלתי נשכחת." />
    <meta property="og:title" content="ארה - סדנאות חיות עם אילה" />
    <meta property="og:description" content="סדנאות וחוגים חוויתיים עם חיות לגנים, מוסדות, משפחות ואירועים." />
    <meta property="og:image" content="/logo.jpeg" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/logo.jpeg" />
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", (user) => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
